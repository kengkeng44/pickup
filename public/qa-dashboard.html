<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pickup Q&A 對照表 — Source of Truth</title>
<style>
  :root {
    --bg: #f1ebe1;
    --card: #ffffff;
    --border: #e0d0b8;
    --accent: #c8a878;
    --accent-dark: #8b6f4a;
    --text: #3c2a1c;
    --muted: #7a6850;
    --correct: #7ac74a;
    --correct-dark: #5d9a35;
    --type-narration: #a78bfa;
    --type-listen-tf: #60a5fa;
    --type-listen-mc: #f59e0b;
    --type-listen-comprehension: #ef6b3d;
    --type-listen-emoji: #ec4899;
    --type-type-what-you-hear: #14b8a6;
    --type-tap-tiles: #84cc16;
    --type-tap-pairs: #3d8aae;
    --type-read-mc-with-audio: #b08838;
    --type-default: #94a3b8;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: 'Nunito', 'Noto Sans TC', system-ui, -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

  /* v2.0.B.180: compact sticky header. Was ~440px tall on mobile; now ~140px. */
  header { position: sticky; top: 0; z-index: 50; background: rgba(241,235,225,0.96);
    backdrop-filter: blur(10px); border-bottom: 1.5px solid var(--border);
    padding: max(8px, env(safe-area-inset-top)) 10px 6px; }
  .head-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  h1 { margin: 0; font-size: 14px; font-weight: 900; color: var(--text);
    display: flex; align-items: baseline; gap: 6px; flex: 1; min-width: 0; }
  h1 .emoji { font-size: 16px; }
  h1 .stats-inline { font-size: 10px; color: var(--muted); font-weight: 700; letter-spacing: 0.3px;
    white-space: nowrap; }
  .head-actions { display: flex; gap: 4px; flex: 0 0 auto; }
  .head-btn { width: 30px; height: 30px; padding: 0; background: #fffbf2;
    border: 1.5px solid var(--border); border-radius: 8px; color: var(--accent-dark);
    font-size: 13px; cursor: pointer; font-family: inherit;
    display: inline-flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  .head-btn.active { background: var(--accent); color: #fff; border-color: var(--accent-dark); }

  /* Horizontal-scroll chip strip — single row, snap-scroll */
  .chip-strip { display: flex; flex-wrap: nowrap; gap: 5px;
    overflow-x: auto; overflow-y: hidden;
    scroll-snap-type: x proximity;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 4px; margin: 0 -10px; padding-left: 10px; padding-right: 10px;
    scrollbar-width: none; }
  .chip-strip::-webkit-scrollbar { display: none; }
  .filter-chip { display: inline-flex; align-items: center; gap: 3px; padding: 5px 9px;
    border-radius: 999px; border: 1.5px solid var(--border); background: #fffbf2;
    color: var(--text); font-size: 11px; font-weight: 800; cursor: pointer; font-family: inherit;
    white-space: nowrap; flex: 0 0 auto; scroll-snap-align: start;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    transition: background 120ms, border-color 120ms, color 120ms; }
  .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent-dark); }
  .filter-chip .count { opacity: 0.7; font-weight: 600; font-size: 10px; }

  /* Collapsible type-filter panel */
  .type-panel { max-height: 0; overflow: hidden;
    transition: max-height 200ms ease-out; }
  .type-panel.expanded { max-height: 220px; overflow-y: auto; }
  .type-panel .chip-strip { flex-wrap: wrap; padding-top: 6px; padding-bottom: 6px; gap: 4px; }

  /* Search bar — slim inline */
  .search-row { display: flex; gap: 6px; align-items: center; margin-top: 5px; }
  #search { flex: 1; padding: 5px 9px; font-size: 12px;
    font-family: inherit; border: 1.5px solid var(--border); border-radius: 8px;
    background: #fffbf2; color: var(--text); }
  #search:focus { outline: none; border-color: var(--accent); }
  #search::-webkit-search-cancel-button { -webkit-appearance: none;
    width: 14px; height: 14px; background: var(--muted); border-radius: 50%;
    -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23000' d='M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z'/></svg>") center/14px no-repeat; cursor: pointer; }

  /* Content — tightened density */
  main { padding: 10px 12px 80px; max-width: 720px; margin: 0 auto; }
  .lesson-block { margin-bottom: 18px; }
  .lesson-head { font-size: 12px; font-weight: 800; color: var(--accent-dark);
    margin-bottom: 6px; padding: 6px 10px; background: rgba(200,168,120,0.10);
    border-radius: 8px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    position: sticky; top: 140px; z-index: 5; backdrop-filter: blur(6px); }
  .lesson-head .ch-prefix { font-family: ui-monospace, Consolas, monospace; font-size: 10px;
    background: var(--accent-dark); color: #fff; padding: 2px 6px; border-radius: 4px;
    font-weight: 900; letter-spacing: 0.3px; }
  .lesson-head .lesson-id { font-family: ui-monospace, Consolas, monospace; font-size: 10px;
    background: var(--accent); color: #fff; padding: 2px 7px; border-radius: 999px; font-weight: 700; }
  .lesson-head .lesson-beat { color: var(--text); font-weight: 800; font-size: 13px; }
  .lesson-head .lesson-meta { font-size: 9px; color: var(--muted); font-weight: 600; margin-left: auto; }

  .q-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px; margin-bottom: 6px; box-shadow: 0 1px 0 var(--border); }
  .q-head { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .type-chip { display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 10px; font-weight: 900; color: #fff; letter-spacing: 0.5px; text-transform: uppercase; }
  .q-id { font-family: ui-monospace, Consolas, monospace; font-size: 10px; color: var(--muted); }
  .q-tags { font-size: 10px; color: var(--muted); margin-left: auto; }

  .field-row { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; }
  .field-label { flex: 0 0 64px; font-size: 10px; font-weight: 900; color: var(--muted);
    letter-spacing: 0.5px; text-transform: uppercase; padding-top: 3px; }
  .field-value { flex: 1; font-size: 14px; color: var(--text); word-break: break-word; }

  .speaker-btn { flex: 0 0 28px; height: 28px; width: 28px; padding: 0;
    background: var(--accent-dark); color: #fff; border: none; border-radius: 50%;
    cursor: pointer; font-size: 14px; line-height: 1; display: inline-flex;
    align-items: center; justify-content: center; font-family: inherit;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  .speaker-btn:hover { background: var(--accent); }
  .speaker-btn:active { transform: translateY(1px); }

  /* v2.0.B.179: prose-style sentence + question pill (game-mirror) */
  .sentence-card { display: flex; align-items: center; gap: 10px; padding: 12px 14px;
    background: #fff7e8; border: 1.5px solid var(--accent); border-radius: 14px;
    margin: 6px 0 10px;
    box-shadow: inset 0 4px 0 rgba(231,164,74,0.18); }
  .sentence-prose { flex: 1; font-size: 15px; font-weight: 800; color: var(--text);
    line-height: 1.7; letter-spacing: 0.02em; }
  .sentence-blanks { flex: 1; font-size: 16px; font-weight: 900; color: var(--accent-dark);
    line-height: 1.7; letter-spacing: 0.15em; font-family: ui-monospace, Consolas, monospace; }
  .sentence-truth { font-size: 11px; color: var(--muted); font-style: italic; margin-top: 4px;
    font-weight: 600; letter-spacing: 0; font-family: inherit; }

  .question-pill { display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    background: #fff; border: 1.5px solid var(--border); border-bottom-width: 2.5px;
    border-radius: 12px; margin-bottom: 10px; }
  .question-words { flex: 1; font-size: 15px; font-weight: 800; color: var(--text);
    line-height: 1.6; }
  .question-words .word { display: inline-block;
    border-bottom: 1.5px dashed #c8a878;
    padding-bottom: 1px; margin: 0 1px;
    cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .question-words .word:active { border-bottom-color: var(--accent-dark);
    background: rgba(200,168,120,0.18); border-radius: 3px; }

  .question-zh { font-size: 12px; color: var(--muted); margin-top: 4px;
    padding-left: 38px; }

  .opts { display: grid; grid-template-columns: 1fr; gap: 4px; margin-top: 4px; }
  .opt { display: flex; align-items: center; gap: 8px; padding: 6px 10px;
    border-radius: 8px; background: #fef8ed; border: 1px solid var(--border);
    font-size: 13px; }
  .opt.correct { background: #eaf6d5; border-color: var(--correct-dark);
    box-shadow: inset 3px 0 0 var(--correct-dark); }
  .opt-num { flex: 0 0 18px; font-family: ui-monospace, Consolas, monospace;
    font-size: 11px; font-weight: 700; color: var(--muted); }
  .opt-en { flex: 1; color: var(--text); font-weight: 700; }
  .opt-zh { flex: 0 0 auto; font-size: 11px; color: var(--muted); font-weight: 600;
    border-left: 1px solid var(--border); padding-left: 8px; max-width: 35%; text-align: right; }
  .opt.correct .opt-num::before { content: '✓ '; color: var(--correct-dark); }

  .explanation { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 8px;
    padding: 6px 10px; background: #fef8ed; border-left: 3px solid var(--accent); border-radius: 0 6px 6px 0; }

  .pairs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 4px; }
  .pair { padding: 6px 10px; background: #fef8ed; border: 1px solid var(--border);
    border-radius: 8px; font-size: 13px; }
  .pair-en { font-weight: 700; }
  .pair-zh { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .tiles-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .tile { padding: 4px 10px; background: #fff; border: 1.5px solid var(--accent);
    border-radius: 8px; font-size: 12px; font-weight: 700; color: var(--text); }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }

  /* Type chip color modifiers via attribute selectors */
  .type-chip[data-type="narration"] { background: var(--type-narration); }
  .type-chip[data-type="listen-tf"] { background: var(--type-listen-tf); }
  .type-chip[data-type="listen-tf-zh"] { background: var(--type-listen-tf); }
  .type-chip[data-type="listen-mc"] { background: var(--type-listen-mc); }
  .type-chip[data-type="listen-comprehension"] { background: var(--type-listen-comprehension); }
  .type-chip[data-type="listen-emoji"] { background: var(--type-listen-emoji); }
  .type-chip[data-type="type-what-you-hear"] { background: var(--type-type-what-you-hear); }
  .type-chip[data-type="tap-tiles"] { background: var(--type-tap-tiles); }
  .type-chip[data-type="tap-pairs"] { background: var(--type-tap-pairs); }
  .type-chip[data-type="read-mc-with-audio"] { background: var(--type-read-mc-with-audio); }

  /* Loading */
  .loading { display: flex; align-items: center; justify-content: center; padding: 40px 20px;
    color: var(--muted); font-size: 13px; }
  .loading::before { content: ''; display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 800ms linear infinite; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <div class="head-row">
    <h1>
      <span class="emoji">📖</span>
      <span>Q&A 對照</span>
      <span class="stats-inline" id="stats">載入中…</span>
    </h1>
    <div class="head-actions">
      <button id="prev-ch" class="head-btn" aria-label="上一章" title="上一章">◀</button>
      <button id="next-ch" class="head-btn" aria-label="下一章" title="下一章">▶</button>
      <button id="toggle-types" class="head-btn" aria-label="題型篩選" title="題型篩選">⚙</button>
      <button id="scroll-top" class="head-btn" aria-label="回到頂端" title="回到頂端">▲</button>
    </div>
  </div>
  <div class="chip-strip" id="ch-filters">
    <!-- chapter chips injected here -->
  </div>
  <div class="type-panel" id="type-panel">
    <div class="chip-strip" id="type-filters">
      <!-- type chips injected here -->
    </div>
  </div>
  <div class="search-row">
    <input id="search" type="search" placeholder="🔍 搜 sentence / question / id…" autocomplete="off">
  </div>
</header>
<main id="content">
  <div class="loading">載入 lessons JSON…</div>
</main>

<script>
  // ─── Q&A inspection dashboard — mirrors game lesson schema exactly ──────
  // Fetches /lessons-ch{1..8}.json + renders read-only Q list for cross-check.
  // Uses WebSpeech for audio (no MP3 lookup parity — that's tts.ts's job).

  const CHAPTERS = [1, 2, 3, 4, 5, 6, 7, 8];
  const CHAPTER_TITLES = {
    1: '院子裡的第一個故事',
    2: '桃太郎',
    3: '醜小鴨',
    4: '龜兔賽跑',
    5: '駱駝為什麼有駝峰',
    6: 'Baba Yaga',
    7: '六隻天鵝',
    8: '葉限',
  };

  // ─── State ─────────────────────────────────────────────────────────────
  const state = {
    lessonsByChapter: {},    // chapter -> Lesson[]
    activeChapter: 1,
    activeTypes: new Set(),  // empty = all
    search: '',
    typeStats: {},           // type -> count
  };

  // ─── Helpers ───────────────────────────────────────────────────────────
  function applyDefaults(s) {
    if (typeof s !== 'string') return s;
    return s.replace(/\{catName\}/g, 'Mochi').replace(/\{dogName\}/g, 'Hana');
  }

  function speak(text) {
    if (!text || !window.speechSynthesis) return;
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(applyDefaults(text));
      u.lang = 'en-US';
      u.rate = 0.85;
      window.speechSynthesis.speak(u);
    } catch (e) { console.warn(e); }
  }

  function escapeHtml(s) {
    if (typeof s !== 'string') return '';
    return s.replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  // v2.0.B.179: game-mirror helpers
  // Blind-cloze types: full sentence masked to underscores in game pre-reveal.
  // Matches renderers.tsx blanks() = text.split(/\s+/).map(()=>'____').join(' ').
  const BLIND_CLOZE_TYPES = new Set(['listen-mc', 'listen-comprehension', 'listen-emoji', 'read-mc-with-audio']);

  function gameBlanks(text) {
    return applyDefaults(text).split(/\s+/).filter(Boolean).map(() => '____').join(' ');
  }

  // wrapWords: split on whitespace, wrap each word (with trailing punct stripped
  // outside the underline) into a tappable span. Matches game's WordHint affordance.
  function wrapWords(text) {
    const subbed = applyDefaults(text);
    return subbed.split(/(\s+)/).map(token => {
      if (/^\s+$/.test(token)) return token;
      const m = token.match(/^([\p{L}\p{N}'-]+)(.*)$/u);
      if (m) {
        return `<span class="word" data-speak="${escapeHtml(m[1])}">${escapeHtml(m[1])}</span>${escapeHtml(m[2])}`;
      }
      return escapeHtml(token);
    }).join('');
  }

  // ─── Fetch all chapters ────────────────────────────────────────────────
  async function loadAll() {
    const results = await Promise.allSettled(
      CHAPTERS.map(ch =>
        fetch(`/lessons-ch${ch}.json`).then(r => r.ok ? r.json() : []).then(d => ({ ch, lessons: d || [] }))
      )
    );
    for (const r of results) {
      if (r.status === 'fulfilled') {
        state.lessonsByChapter[r.value.ch] = r.value.lessons;
        for (const lesson of r.value.lessons) {
          for (const q of (lesson.questions || [])) {
            state.typeStats[q.type] = (state.typeStats[q.type] || 0) + 1;
          }
        }
      }
    }
    renderFilters();
    render();
  }

  // ─── Filter chips ──────────────────────────────────────────────────────
  function renderFilters() {
    const chBar = document.getElementById('ch-filters');
    chBar.innerHTML = '';
    for (const ch of CHAPTERS) {
      const total = (state.lessonsByChapter[ch] || []).reduce((s, l) => s + (l.questions?.length || 0), 0);
      const chip = document.createElement('button');
      chip.className = 'filter-chip' + (ch === state.activeChapter ? ' active' : '');
      chip.dataset.ch = ch;
      // v2.0.B.180: compact label — Ch# + abbreviated title (first 3 chars CJK)
      const abbr = (CHAPTER_TITLES[ch] || '').slice(0, 4);
      chip.innerHTML = `Ch${ch} ${escapeHtml(abbr)} <span class="count">${total}</span>`;
      chip.onclick = () => { state.activeChapter = ch; renderFilters(); render(); scrollChipIntoView(); };
      chBar.appendChild(chip);
    }
    // Auto-scroll active chip into view
    requestAnimationFrame(scrollChipIntoView);
  }

  function scrollChipIntoView() {
    const active = document.querySelector('#ch-filters .filter-chip.active');
    if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

    const tBar = document.getElementById('type-filters');
    tBar.innerHTML = '';
    const allChip = document.createElement('button');
    allChip.className = 'filter-chip' + (state.activeTypes.size === 0 ? ' active' : '');
    allChip.textContent = '全部題型';
    allChip.onclick = () => { state.activeTypes.clear(); renderFilters(); render(); };
    tBar.appendChild(allChip);
    const types = Object.keys(state.typeStats).sort();
    for (const t of types) {
      const chip = document.createElement('button');
      chip.className = 'filter-chip' + (state.activeTypes.has(t) ? ' active' : '');
      chip.innerHTML = `${escapeHtml(t)} <span class="count">${state.typeStats[t]}</span>`;
      chip.onclick = () => {
        if (state.activeTypes.has(t)) state.activeTypes.delete(t);
        else state.activeTypes.add(t);
        renderFilters(); render();
      };
      tBar.appendChild(chip);
    }
  }

  // ─── Q card builder ────────────────────────────────────────────────────
  function renderQCard(q) {
    const tags = (q.tags || []).join(', ');
    const subSkill = q.subSkill ? ` · ${q.subSkill}` : '';
    const level = q.level ? ` · L${q.level}` : '';
    const diff = q.difficulty ? ` · ${q.difficulty}` : '';

    const parts = [];
    parts.push(`<div class="q-head">`);
    parts.push(`<span class="type-chip" data-type="${escapeHtml(q.type)}">${escapeHtml(q.type)}</span>`);
    parts.push(`<span class="q-id">${escapeHtml(q.id)}</span>`);
    parts.push(`<span class="q-tags">${escapeHtml(tags + subSkill + level + diff)}</span>`);
    parts.push(`</div>`);

    // sentence — game-mirror prose card (blanks for listen-mc family, full prose otherwise)
    if (q.sentence) {
      const isBlind = BLIND_CLOZE_TYPES.has(q.type);
      const speakText = escapeHtml(applyDefaults(q.sentence));
      parts.push(`<div class="sentence-card">`);
      parts.push(`<button class="speaker-btn" data-speak="${speakText}">🔊</button>`);
      if (isBlind) {
        parts.push(`<div style="flex:1;">`);
        parts.push(`<div class="sentence-blanks">${escapeHtml(gameBlanks(q.sentence))}</div>`);
        parts.push(`<div class="sentence-truth">答案: ${escapeHtml(applyDefaults(q.sentence))}</div>`);
        parts.push(`</div>`);
      } else {
        parts.push(`<div class="sentence-prose">${escapeHtml(applyDefaults(q.sentence))}</div>`);
      }
      parts.push(`</div>`);
    }

    // question prompt — framed pill with dashed-underline words + 🔊
    const qP = q.question || q.questionEn;
    if (qP) {
      const speakQ = escapeHtml(applyDefaults(qP));
      parts.push(`<div class="question-pill">`);
      parts.push(`<button class="speaker-btn" data-speak="${speakQ}">🔊</button>`);
      parts.push(`<div class="question-words">${wrapWords(qP)}</div>`);
      parts.push(`</div>`);
      if (q.questionZh) {
        parts.push(`<div class="question-zh">${escapeHtml(q.questionZh)}</div>`);
      }
    }

    // options (listen-mc / listen-comprehension / listen-emoji / read-mc-with-audio / listen-tf-zh)
    if (Array.isArray(q.options) && q.options.length > 0) {
      parts.push(`<div class="field-row" style="display:block;">`);
      parts.push(`<div class="field-label" style="margin-bottom:4px;">Options · 正解 #${q.correctIndex}</div>`);
      parts.push(`<div class="opts">`);
      for (let i = 0; i < q.options.length; i++) {
        const isCorrect = i === q.correctIndex;
        const zh = q.optionsZh?.[i] ? `<div class="opt-zh">${escapeHtml(q.optionsZh[i])}</div>` : '';
        parts.push(`<div class="opt${isCorrect ? ' correct' : ''}">`);
        parts.push(`<span class="opt-num">${i}</span>`);
        parts.push(`<span class="opt-en">${escapeHtml(applyDefaults(q.options[i]))}</span>`);
        parts.push(zh);
        parts.push(`</div>`);
      }
      parts.push(`</div></div>`);
    }

    // listen-tf
    if (q.type === 'listen-tf' || q.type === 'listen-tf-zh') {
      parts.push(`<div class="field-row">`);
      parts.push(`<div class="field-label">正解</div>`);
      parts.push(`<div class="field-value"><strong style="color:${q.answer === 'T' ? 'var(--correct-dark)' : '#a82020'}">${q.answer === 'T' ? '✓ TRUE' : '✗ FALSE'}</strong></div>`);
      parts.push(`</div>`);
    }

    // tap-tiles
    if (Array.isArray(q.tilesEn)) {
      parts.push(`<div class="field-row" style="display:block;">`);
      parts.push(`<div class="field-label" style="margin-bottom:4px;">Tiles</div>`);
      parts.push(`<div class="tiles-list">`);
      for (const t of q.tilesEn) parts.push(`<span class="tile">${escapeHtml(t)}</span>`);
      parts.push(`</div></div>`);
    }

    // tap-pairs
    if (Array.isArray(q.pairsEn)) {
      parts.push(`<div class="field-row" style="display:block;">`);
      parts.push(`<div class="field-label" style="margin-bottom:4px;">Pairs</div>`);
      parts.push(`<div class="pairs-grid">`);
      for (const p of q.pairsEn) {
        parts.push(`<div class="pair"><div class="pair-en">${escapeHtml(p[0])}</div><div class="pair-zh">↔ ${escapeHtml(p[1])}</div></div>`);
      }
      parts.push(`</div></div>`);
    }

    // explanation
    if (q.explanationZh) {
      parts.push(`<div class="explanation">${escapeHtml(applyDefaults(q.explanationZh))}</div>`);
    }

    return `<div class="q-card">${parts.join('')}</div>`;
  }

  // ─── Main render ───────────────────────────────────────────────────────
  function render() {
    const content = document.getElementById('content');
    const lessons = state.lessonsByChapter[state.activeChapter] || [];
    const searchLower = state.search.toLowerCase().trim();

    let totalQ = 0, shownQ = 0;
    const html = [];
    for (const lesson of lessons) {
      const filteredQ = (lesson.questions || []).filter(q => {
        if (state.activeTypes.size > 0 && !state.activeTypes.has(q.type)) return false;
        if (searchLower) {
          const blob = [q.id, q.sentence, q.question, q.questionEn, q.explanationZh, ...(q.options || [])].join(' ').toLowerCase();
          if (!blob.includes(searchLower)) return false;
        }
        return true;
      });
      totalQ += (lesson.questions || []).length;
      shownQ += filteredQ.length;
      if (filteredQ.length === 0) continue;

      html.push(`<div class="lesson-block">`);
      html.push(`<div class="lesson-head">`);
      // v2.0.B.180: ch prefix for visual chapter alignment when comparing
      html.push(`<span class="ch-prefix">Ch${state.activeChapter}</span>`);
      html.push(`<span class="lesson-id">${escapeHtml(lesson.id)}</span>`);
      if (lesson.storyBeat) html.push(`<span class="lesson-beat">${escapeHtml(applyDefaults(lesson.storyBeat))}</span>`);
      html.push(`<span class="lesson-meta">${filteredQ.length}Q</span>`);
      html.push(`</div>`);
      for (const q of filteredQ) html.push(renderQCard(q));
      html.push(`</div>`);
    }

    if (html.length === 0) {
      content.innerHTML = `<div class="empty">沒有符合條件的題目<br><small>搜尋 / 題型 filter 試試清掉</small></div>`;
    } else {
      content.innerHTML = html.join('');
    }
    document.getElementById('stats').textContent =
      `· ${shownQ}/${totalQ} Q · ${lessons.length}L`;

    // wire speaker buttons + dashed-underline word taps (both speak their text)
    content.querySelectorAll('.speaker-btn').forEach(btn => {
      btn.onclick = (e) => { e.stopPropagation(); speak(btn.dataset.speak); };
    });
    content.querySelectorAll('.question-words .word').forEach(w => {
      w.onclick = (e) => { e.stopPropagation(); speak(w.dataset.speak); };
    });
  }

  // ─── Search wiring ─────────────────────────────────────────────────────
  document.getElementById('search').addEventListener('input', (e) => {
    state.search = e.target.value;
    render();
  });

  // ─── v2.0.B.180: header action buttons ─────────────────────────────────
  document.getElementById('prev-ch').onclick = () => {
    const idx = CHAPTERS.indexOf(state.activeChapter);
    if (idx > 0) { state.activeChapter = CHAPTERS[idx - 1]; renderFilters(); render(); window.scrollTo({ top: 0 }); }
  };
  document.getElementById('next-ch').onclick = () => {
    const idx = CHAPTERS.indexOf(state.activeChapter);
    if (idx < CHAPTERS.length - 1) { state.activeChapter = CHAPTERS[idx + 1]; renderFilters(); render(); window.scrollTo({ top: 0 }); }
  };
  document.getElementById('toggle-types').onclick = () => {
    const panel = document.getElementById('type-panel');
    const btn = document.getElementById('toggle-types');
    panel.classList.toggle('expanded');
    btn.classList.toggle('active');
  };
  document.getElementById('scroll-top').onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

  // ─── Boot ──────────────────────────────────────────────────────────────
  loadAll().catch(err => {
    document.getElementById('content').innerHTML =
      `<div class="empty">載入失敗: ${escapeHtml(err.message || String(err))}</div>`;
  });
</script>
</body>
</html>
