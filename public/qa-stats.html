<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pickup Q&A 數據總覽 — Stats Dashboard</title>
<style>
  :root {
    --bg: #f1ebe1; --card: #ffffff; --border: #e0d0b8; --accent: #c8a878; --accent-dark: #8b6f4a;
    --text: #3c2a1c; --muted: #7a6850; --ok: #5d9a35; --warn: #d68b3a; --bad: #c84a3a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: 'Nunito', 'Noto Sans TC', system-ui, -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  header { position: sticky; top: 0; z-index: 50; background: rgba(241,235,225,0.96);
    backdrop-filter: blur(10px); border-bottom: 1.5px solid var(--border);
    padding: max(8px, env(safe-area-inset-top)) 12px 8px;
    display: flex; align-items: center; gap: 10px; min-height: 44px; }
  .back-btn { width: 32px; height: 32px; padding: 0; background: transparent; border: none; cursor: pointer;
    font-family: inherit; display: inline-flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation; flex: 0 0 auto; color: var(--text);
    text-decoration: none; border-radius: 8px; }
  .back-btn svg { width: 22px; height: 22px; display: block; }
  h1 { margin: 0; font-size: 15px; font-weight: 900; color: var(--text);
    display: flex; align-items: baseline; gap: 6px; flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  h1 .emoji { font-size: 17px; }
  h1 .sub { font-size: 10px; color: var(--muted); font-weight: 700; letter-spacing: 0.3px; white-space: nowrap; }
  main { padding: 14px 12px 30px; max-width: 920px; margin: 0 auto; }
  .ribbon { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  .ribbon .stat { background: var(--card); border: 1.5px solid var(--border); border-radius: 12px;
    padding: 12px 8px; text-align: center; box-shadow: 0 2px 6px rgba(60,42,28,0.04); }
  .ribbon .stat .n { font-size: 26px; font-weight: 900; color: var(--text); line-height: 1; }
  .ribbon .stat .lbl { font-size: 11px; color: var(--muted); font-weight: 700; margin-top: 4px; letter-spacing: 0.3px; }
  .section { background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 14px; }
  .section h2 { margin: 0 0 6px; font-size: 14px; font-weight: 900; display: flex; align-items: center; gap: 6px; }
  .section .desc { font-size: 11px; color: var(--muted); margin: 0 0 12px; line-height: 1.4; }
  .detail-link { display: flex; align-items: center; gap: 12px; background: var(--card);
    border: 2px solid var(--accent); border-bottom: 4px solid var(--accent-dark); border-radius: 14px;
    padding: 16px; margin-bottom: 14px; text-decoration: none; color: var(--text); }
  .detail-link .t { flex: 1; }
  .detail-link .t b { font-size: 15px; font-weight: 900; }
  .detail-link .t span { display: block; font-size: 12px; color: var(--muted); font-weight: 700; margin-top: 2px; }
  .detail-link .arrow { font-size: 22px; color: var(--accent-dark); }
  .footer-meta { text-align: center; color: var(--muted); font-size: 11px; margin-top: 20px; line-height: 1.6; }
</style>
</head>
<body>
<header>
  <a class="back-btn" href="https://pickup-cockpit.pages.dev/" aria-label="回控制中心 Back to Dashboard">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>
  </a>
  <h1>
    <span class="emoji">📊</span>
    <span>數據總覽</span>
    <span class="sub" id="meta">…</span>
  </h1>
</header>

<main>
  <!-- 關鍵數字 (主線) -->
  <div class="ribbon">
    <div class="stat"><div class="n" id="statCh">…</div><div class="lbl">📚 章節</div></div>
    <div class="stat"><div class="n" id="statLessons">…</div><div class="lbl">📝 單元</div></div>
    <div class="stat"><div class="n" id="statQ">…</div><div class="lbl">❓ 題目</div></div>
  </div>
  <div id="examLine"></div>

  <!-- KPI headline -->
  <div class="section">
    <h2>📈 營運指標 KPI</h2>
    <p class="desc">預計完成時間 + 客戶終生價值 · 即時從內容量推算 (商業假設標於卡片, 可調)</p>
    <div id="kpiCards"><p class="desc">計算中…</p></div>
  </div>

  <!-- 細節 → 子頁面 -->
  <a class="detail-link" href="/qa-details.html">
    <span style="font-size:26px;">🔍</span>
    <span class="t"><b>看完整細節</b><span>題型 / 程度 / 難度 / 章節分布 (主線 vs 英檢 各自拆)</span></span>
    <span class="arrow" aria-hidden="true">›</span>
  </a>

  <!-- 定位主軸 (context) -->
  <div class="section" style="background:linear-gradient(135deg,#e8f4dd 0%,#f4f9e8 100%); border:2px solid var(--ok);">
    <h2 style="color:var(--ok);">✅ 定位主軸</h2>
    <p class="desc" style="margin:0;">旁白(narration)佔比高是刻意的 — Pickup 走「親子一起聽英文」路線, 不是「小孩自己一直答題」。題型優先序 / 評分 / 語音速度都跟著這條走。</p>
  </div>

  <div class="footer-meta" id="footer">即時計算 · Source: <code>public/lessons-ch*.json</code></div>
</main>

<script src="/qa-compute.js"></script>
<script>
(function(){
  QA.computeBuckets().then(function(d){
    var main=d.main, exam=d.exam;
    document.getElementById('statCh').textContent = QA.fmt(main.chapters.length);
    document.getElementById('statLessons').textContent = QA.fmt(main.lessons);
    document.getElementById('statQ').textContent = QA.fmt(main.q);
    if (exam.q) {
      document.getElementById('examLine').innerHTML =
        '<div style="text-align:center;font-size:13px;font-weight:800;color:var(--muted);margin:0 0 12px;">'+
        '🎓 英檢 English Exam · '+QA.fmt(exam.chapters.length)+' 章 · '+QA.fmt(exam.lessons)+' 單元 · '+QA.fmt(exam.q)+' 題 (與主線分開)</div>';
    }
    var A=QA.ASSUME;
    var daysMain=Math.ceil(main.lessons/A.energyPerDay), monthsMain=daysMain/30;
    var ltvPaying=A.monthlyPrice*A.avgSubMonths, ltvBlended=ltvPaying*A.convRate;
    var timeCard=QA.kpiCard('⏳','預計完成時間 (主線)', QA.fmtDur(main.seconds),
      exam.seconds ? '英檢另 +'+QA.fmtDur(exam.seconds) : '',
      ['每題型加權估時','每天 '+A.energyPerDay+' 關'],
      '每天 '+A.energyPerDay+' 關 → 約 <b>'+QA.fmt(daysMain)+' 天</b> (~'+monthsMain.toFixed(1)+' 個月) 走完主線。');
    var ltvCard=QA.kpiCard('💰','客戶終生價值 LTV', 'NT$ '+QA.fmt(Math.round(ltvPaying)),
      '每付費用戶 · 分攤到每用戶 ≈ NT$ '+ltvBlended.toFixed(0),
      ['月費 NT$'+A.monthlyPrice,'轉換 '+(A.convRate*100).toFixed(0)+'%','留存 '+A.avgSubMonths+' 月'],
      'LTV = 月費 × 訂閱月數。內容跑道 ~<b>'+monthsMain.toFixed(1)+' 個月</b> = 留存天花板 (內容越多 → LTV 越高)。目標 LTV:CAC ≥ 3。');
    document.getElementById('kpiCards').innerHTML='<div style="display:flex;gap:12px;flex-wrap:wrap;">'+timeCard+ltvCard+'</div>';
    document.getElementById('meta').textContent='v2.0.B.545 · 即時計算';
  });
})();
</script>
</body>
</html>
