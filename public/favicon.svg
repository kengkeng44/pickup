<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 故事燈 StoryLamp icon — 一盞燈 + 搖椅背影 (奶奶髮髻從椅背露出) -->
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2d21"/>
      <stop offset="1" stop-color="#20180f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.34" r="0.62">
      <stop offset="0" stop-color="#ffcf8a" stop-opacity="0.8"/>
      <stop offset="0.45" stop-color="#ffc478" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#ffc478" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bulbGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff3d0" stop-opacity="0.95"/>
      <stop offset="0.4" stop-color="#ffd98e" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffd98e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#night)"/>
  <rect width="512" height="512" fill="url(#glow)"/>
  <!-- 吊繩 -->
  <rect x="252" y="0" width="8" height="92" rx="4" fill="#5a4530"/>
  <!-- 燈罩 -->
  <path d="M198 166 Q198 92 256 92 Q314 92 314 166 Z" fill="#c98a3e"/>
  <rect x="188" y="158" width="136" height="16" rx="8" fill="#b87830"/>
  <!-- 燈泡 + 光暈 -->
  <circle cx="256" cy="198" r="64" fill="url(#bulbGlow)"/>
  <circle cx="256" cy="188" r="17" fill="#ffe9b8"/>
  <!-- 搖椅背影 (深剪影) + 奶奶髮髻從椅背露出 -->
  <g fill="#171008">
    <circle cx="256" cy="238" r="13" fill="#241a10"/>
    <circle cx="256" cy="272" r="30" fill="#241a10"/>
    <rect x="184" y="282" width="144" height="124" rx="26"/>
    <rect x="158" y="336" width="34" height="16" rx="8"/>
    <rect x="320" y="336" width="34" height="16" rx="8"/>
    <rect x="204" y="400" width="15" height="38" rx="6"/>
    <rect x="293" y="400" width="15" height="38" rx="6"/>
  </g>
  <path d="M146 442 Q256 484 366 442" fill="none" stroke="#171008" stroke-width="15" stroke-linecap="round"/>
</svg>
