<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fef8ed" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Pickup · CEFR cloze challenge</title>
    <meta name="description" content="Pickup — a cozy after-work English game. CEFR A2 cloze challenges paired with a stray cat's journey home." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet" />
    <style>
      /* Inline pre-boot skeleton — paints before main.ts loads, so the
       * first paint isn't blank white. Removed by main.ts after Phaser
       * mounts the BootScene. */
      html, body { font-family: 'Noto Sans TC', system-ui, -apple-system, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: #fef8ed; margin: 0; padding: 0; }
      #pickup-preboot-inline {
        position: fixed; inset: 0; background: #fef8ed;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 14px; z-index: 50; pointer-events: none;
        transition: opacity 320ms ease-out;
      }
      #pickup-preboot-inline.is-hidden { opacity: 0; }
      #pickup-preboot-inline .mark { font-size: 40px; font-weight: 900; color: #e7a44a; letter-spacing: -0.5px; animation: pbpulse 1.2s ease-in-out infinite; }
      #pickup-preboot-inline .dots { display: flex; gap: 7px; }
      #pickup-preboot-inline .dots span { width: 9px; height: 9px; border-radius: 50%; background: #e7a44a; opacity: 0.3; animation: pbdot 1.2s ease-in-out infinite; }
      #pickup-preboot-inline .dots span:nth-child(2) { animation-delay: 0.18s; }
      #pickup-preboot-inline .dots span:nth-child(3) { animation-delay: 0.36s; }
      @keyframes pbpulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.97); } }
      @keyframes pbdot { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); } 40% { opacity: 1; transform: scale(1.15); } }
      @media (prefers-reduced-motion: reduce) {
        #pickup-preboot-inline .mark, #pickup-preboot-inline .dots span { animation: none; }
      }

      /* v1.6.0 entry transition — curtain rise.
       * Two horizontal panels slide off (top up / bottom down) revealing
       * the splash. Runs on every fresh page load, then removes itself
       * after the animation completes (handled in main.ts).
       * Lives in <head> inline so it paints on the very first frame —
       * no flash of blank app between preboot and the splash.
       */
      #pickup-curtain {
        position: fixed; inset: 0; pointer-events: none; z-index: 9999;
      }
      #pickup-curtain .panel {
        position: absolute; left: 0; right: 0; height: 50%;
        background: linear-gradient(180deg, #e7a44a 0%, #d18d2f 100%);
        will-change: transform;
        box-shadow: 0 0 32px rgba(60, 42, 28, 0.18);
      }
      #pickup-curtain .panel-top    { top: 0;    animation: pickup-curtain-up 0.9s cubic-bezier(0.65, 0, 0.35, 1) 0.6s forwards; }
      #pickup-curtain .panel-bottom { bottom: 0; transform: scaleY(-1); animation: pickup-curtain-up 0.9s cubic-bezier(0.65, 0, 0.35, 1) 0.6s forwards; }
      #pickup-curtain .seal {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        color: #fef8ed; font-family: 'Nunito', system-ui, sans-serif;
        font-size: 28px; font-weight: 900; letter-spacing: 1px;
        opacity: 0; animation: pickup-seal-in 0.5s ease-out 0.1s forwards, pickup-seal-out 0.3s ease-in 0.7s forwards;
        z-index: 1;
      }
      @keyframes pickup-curtain-up {
        from { transform: translateY(0) scaleY(1); }
        to   { transform: translateY(-100%) scaleY(1); }
      }
      /* Bottom panel mirrors via scaleY(-1) so the same keyframe drives both */
      #pickup-curtain .panel-bottom { animation-name: pickup-curtain-down; }
      @keyframes pickup-curtain-down {
        from { transform: translateY(0); }
        to   { transform: translateY(100%); }
      }
      @keyframes pickup-seal-in  { from { opacity: 0; transform: translate(-50%, -50%) scale(0.85); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
      @keyframes pickup-seal-out { from { opacity: 1; } to { opacity: 0; } }
      @media (prefers-reduced-motion: reduce) {
        #pickup-curtain { display: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="pickup-preboot-inline">
      <div class="mark">Pickup</div>
      <div class="dots"><span></span><span></span><span></span></div>
    </div>
    <div id="pickup-curtain" aria-hidden="true">
      <div class="seal">拾光</div>
      <div class="panel panel-top"></div>
      <div class="panel panel-bottom"></div>
    </div>
    <a href="#app" class="skip-link">Skip to main content</a>
    <main id="app"></main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
