<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ed5a2e" />
    <!-- v2.0.B.69 aggressive cache busting: user reports iOS Safari serving stale HTML even with _headers must-revalidate -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- v2.0.B.155 PWA: manifest + iOS home-screen meta. Lets user 'Add to
         Home Screen' on iPhone/iPad and Android for native-app feel. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/mascots/calico-anchor.webp" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Pickup" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Pickup · CEFR cloze challenge</title>
    <meta name="description" content="Pickup — a cozy after-work English game. CEFR A2 cloze challenges paired with a stray cat's journey home." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet" />
    <!-- v2.0.B.190: above-the-fold MapPage LCP-critical images. Replaces
         calico-anchor (Profile only) + icon-speaker (below fold). Coin-gold
         is largest at 178KB so preload prioritises that first.
         Also preload lessons-ch1.json for default chapter LCP fix. -->
    <link rel="preload" as="image" href="/mascots/coin-gold.webp" fetchpriority="high" />
    <link rel="preload" as="image" href="/mascots/crown-gold.webp" />
    <link rel="preload" as="image" href="/mascots/iso-grandma.webp" />
    <link rel="preload" as="image" href="/mascots/iso-shiba.webp" />
    <link rel="preload" as="image" href="/mascots/icon-paw.webp" />
    <link rel="preload" as="image" href="/mascots/icon-flame.webp" />
    <link rel="preload" as="fetch" href="/lessons-ch1.json" crossorigin />
    <style>
      html, body {
        font-family: 'Noto Sans TC', system-ui, -apple-system, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        background: #ed5a2e; /* v1.7.1: bg matches tear-intro so any pre-paint flash stays on-brand */
        margin: 0; padding: 0;
      }

      /* v2.0.B.165: tear-intro removed. React mounts immediately. */
    </style>
  </head>
  <body>
    <a href="#app" class="skip-link">Skip to main content</a>
    <main id="app"></main>
    <!-- v2.0.B.165: removed pickup-tear-intro 2s splash animation + PERF
         banner (Phaser-era). React shell mounts immediately on JS parse,
         no need for cover animation. -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
