<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1b1833" />
    <!-- v2.0.B.69 aggressive cache busting: user reports iOS Safari serving stale HTML even with _headers must-revalidate -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- v2.0.B.155 PWA: manifest + iOS home-screen meta. Lets user 'Add to
         Home Screen' on iPhone/iPad and Android for native-app feel. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="故事燈" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>故事燈 StoryLamp · 奶奶的睡前英文童話</title>
    <meta name="description" content="故事燈 StoryLamp — 奶奶的睡前英文童話。A cozy bedtime English story game for kids and families." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet" />
    <!-- v2.0.B.190: above-the-fold MapPage LCP-critical images. Replaces
         calico-anchor (Profile only) + icon-speaker (below fold). Coin-gold
         is largest at 178KB so preload prioritises that first.
         Also preload lessons-ch1.json for default chapter LCP fix. -->
    <link rel="preload" as="image" href="/mascots/coin-gold.webp" fetchpriority="high" />
    <link rel="preload" as="image" href="/mascots/crown-gold.webp" />
    <link rel="preload" as="image" href="/mascots/iso-grandma.webp" />
    <link rel="preload" as="image" href="/mascots/iso-shiba.webp" />
    <link rel="preload" as="image" href="/mascots/icon-paw.webp" />
    <link rel="preload" as="image" href="/mascots/icon-flame.webp" />
    <link rel="preload" as="fetch" href="/lessons-ch1.json" crossorigin />
    <style>
      html, body {
        font-family: 'Noto Sans TC', system-ui, -apple-system, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        background: #f1ebe1; /* v2.0.B.271: align body bg to map cream (was #ed5a2e tear-intro orange — leaked through overscroll + URL bar blur) */
        margin: 0; padding: 0;
        overscroll-behavior-y: none;
        /* v2.0.B.290 ROOT FIX: 全域關 scroll anchoring. */
        overflow-anchor: none;
        /* v2.0.B.293 REVERT B.291: scroll-snap proximity 在 260 顆 dense snap target
           (每 84px 一個) 上 browser 不斷 micro-snap → user 看到「閃動」.
           砍 scroll-snap, 接受「坐到中間」feature 對這個架構不可行 (snap target 太密).
           若未來真要這 feature → 只在 chapter boundary (每 7 node) 加 snap-align, 31 個 target 足夠. */
      }

      /* v2.0.B.165: tear-intro removed. React mounts immediately. */

      /* v2.0.B.537 (walkthrough-cron TRAUMA-02): 慢網首載時 #app 是空白, 使用者(尤其焦慮型)
         會把白屏誤解成「壞了 / 我的問題」→ 流失。放一個極簡開機爪印, React 掛載即取代。 */
      .pickup-boot {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #f1ebe1;
      }
      .pickup-boot img {
        width: 56px; height: 56px; display: block;
        animation: pickup-boot-pulse 1.1s ease-in-out infinite;
      }
      @keyframes pickup-boot-pulse {
        0%, 100% { transform: scale(0.86); opacity: 0.55; }
        50%      { transform: scale(1.04); opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        .pickup-boot img { animation: none; opacity: 0.8; }
      }
    </style>
  </head>
  <body>
    <a href="#app" class="skip-link">Skip to main content</a>
    <main id="app"><div class="pickup-boot"><img src="/mascots/icon-paw.webp" alt="Loading" width="56" height="56" /></div></main>
    <!-- v2.0.B.165: removed pickup-tear-intro 2s splash animation + PERF
         banner (Phaser-era). React shell mounts immediately on JS parse,
         no need for cover animation. -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
