# v2.0.B.233 — Pickup CI on push + PR
# 升級 validate-lessons.js + vitest 從 ⭐⭐ → ⭐⭐⭐ (進 CI gate)
# 解 audit gap: pre-pivot 沒 CI,改 lessons / framework 後沒人擋

name: Pickup CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      # v2.0.B.392 (arch-cron 0609 P0-2): 循環依賴守門。type-only 循環今天安全,
      # 但有人在 back-edge 加一個 value import → runtime TDZ 崩潰。此 gate 擋住。
      - name: Circular dependency check (madge)
        run: npm run check:circular

      - name: Vitest (basic, coverage 待 @vitest/coverage-v8 安裝後啟用)
        run: npx vitest run

      - name: Validate lessons (X3 anti-verbatim + mirror lint)
        run: node tools/validate-lessons.js

      - name: Content DB regen (audit consistency)
        run: node tools/_content-db.cjs

      - name: Sync hooks idempotent check
        run: |
          node tools/_sync-hooks.cjs
          # 若 sync 後有 diff = 有人手改 _content-db.cjs HOOK_MAP 沒 sync
          git diff --exit-code tools/_content-db.cjs || (echo "ERR: HOOK_MAP not in sync, run node tools/_sync-hooks.cjs" && exit 1)

      - name: QA static regen
        run: node tools/_render-qa-static.cjs

      - name: Vite build
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-validate
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Vite build
        run: npm run build

      - name: Wrangler deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=pickupwords --branch=master --commit-message="Auto-deploy via GH Actions"

  # v2.0.B.252 — cockpit-deploy/ 改完後自動 push pickup-cockpit.pages.dev
  # 之前是手動 wrangler pages deploy, sandbox 沒 CF token 跑不到, 接 CI 解決
  # 30秒 deploy 不貴, 不加 paths filter (省維護, 每 master push 同步)
  deploy-cockpit:
    runs-on: ubuntu-latest
    needs: build-and-validate
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wrangler deploy cockpit to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy cockpit-deploy --project-name=pickup-cockpit --branch=master --commit-message="Auto-deploy cockpit via GH Actions"
